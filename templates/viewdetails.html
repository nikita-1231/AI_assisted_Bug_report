<!DOCTYPE html>
<html>
<head>
<title>My Bug Reports</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/viewdetails.css') }}">

<script>

function deleteBug(id){

fetch("/delete_bug/" + id, {
method: "POST"
})
.then(res => res.json())
.then(data => {

showMessage(data.message)

setTimeout(()=>{
location.reload()
},1000)

})

}

function showMessage(msg){

let messageBox = document.getElementById("msg")
messageBox.innerText = msg
messageBox.style.display = "block"

}

</script>

</head>

<body>

<div class="container">

<h2>📋 My Bug Reports</h2>

<p id="msg" style="display:none;color:green;font-weight:bold;"></p>

{% if reports %}

<table>

<thead>
<tr>
<th>Title</th>
<th>Module</th>
<th>Severity</th>
<th>Priority</th>
<th>Date</th>
<th>Actions</th>
</tr>
</thead>

<tbody>

{% for r in reports %}

<tr>

<td>{{ r.title }}</td>
<td>{{ r.module }}</td>
<td class="severity">{{ r.severity }}</td>
<td class="priority">{{ r.priority }}</td>
<td>{{ r.created_at }}</td>

<td>

<button onclick="updateBug('{{ r._id }}')" class="btn update">Update</button>

<button onclick="deleteBug('{{ r._id }}')" class="btn delete">Delete</button>

</td>

</tr>

{% endfor %}

</tbody>

</table>

{% else %}

<p class="empty">No bug reports found.</p>

{% endif %}

</div>

</body>
</html>

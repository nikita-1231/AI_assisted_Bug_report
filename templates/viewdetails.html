
<!DOCTYPE html>
<html>

<head>

<title>My Bug Reports</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/viewdetails.css') }}">

<script>

function deleteBug(id){

fetch("/delete_bug/" + id,{
method:"POST"
})
.then(res=>res.json())
.then(data=>{

showMessage(data.message)

setTimeout(()=>{
location.reload()
},1000)

})

}


function showMessage(msg){

let messageBox=document.getElementById("msg")

messageBox.innerText=msg
messageBox.style.display="block"
messageBox.style.opacity="1"

setTimeout(()=>{
messageBox.style.transition="opacity 1s"
messageBox.style.opacity="0"
},2000)

setTimeout(()=>{
messageBox.style.display="none"
},3000)

}


function openUpdate(id,title,module,steps,expected,actual){

document.getElementById("updateModal").style.display="block"

document.getElementById("bug_id").value=id
document.getElementById("title").value=title
document.getElementById("module").value=module
document.getElementById("steps").value=steps
document.getElementById("expected").value=expected
document.getElementById("actual").value=actual

}


function closeModal(){

document.getElementById("updateModal").style.display="none"

}


function submitUpdate(){

const id=document.getElementById("bug_id").value

const data={

title:document.getElementById("title").value,
module:document.getElementById("module").value,
steps:document.getElementById("steps").value,
expected:document.getElementById("expected").value,
actual:document.getElementById("actual").value

}

fetch("/update_bug/"+id,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(data)

})

.then(res=>res.json())
.then(data=>{

showMessage(data.message)

setTimeout(()=>{
location.reload()
},1200)

})

}


function updateStatus(id,status){

fetch("/update_status/"+id,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
status:status
})

})

.then(res=>res.json())
.then(data=>{

showMessage(data.message)

})

}

</script>

</head>


<body>

<div class="container">

<h2>📋 My Bug Reports</h2>

<p id="msg" style="display:none;color:green;font-weight:bold;"></p>

{% if reports %}

<table>

<thead>

<tr>

<th>Title</th>
<th>Module</th>
<th>Severity</th>
<th>Priority</th>
<th>Status</th>
<th>Date</th>
<th>Actions</th>

</tr>

</thead>

<tbody>

{% for r in reports %}

<tr>

<td>{{ r.title }}</td>

<td>{{ r.module }}</td>

<td>{{ r.severity }}</td>

<td>{{ r.priority }}</td>

<td>

<select onchange="updateStatus('{{ r._id }}',this.value)">

<option value="Open" {% if r.status == "Open" %}selected{% endif %}>Open</option>

<option value="In Progress" {% if r.status == "In Progress" %}selected{% endif %}>In Progress</option>

<option value="Fixed" {% if r.status == "Fixed" %}selected{% endif %}>Fixed</option>

</select>

</td>

<td>{{ r.created_at }}</td>

<td>

<div class="action-buttons">

<button
onclick="openUpdate('{{ r._id }}','{{ r.title }}','{{ r.module }}','{{ r.steps }}','{{ r.expected }}','{{ r.actual }}')"
class="btn update">

Update

</button>

<button onclick="deleteBug('{{ r._id }}')" class="btn delete">

Delete

</button>

</div>

</td>

</tr>

{% endfor %}

</tbody>

</table>

{% else %}

<p class="empty">No bug reports found.</p>

{% endif %}

</div>


<div id="updateModal" style="display:none;background:#00000090;position:fixed;top:0;left:0;width:100%;height:100%;">

<div style="background:white;padding:20px;width:400px;margin:100px auto;border-radius:10px;">

<h3>Update Bug</h3>

<input type="hidden" id="bug_id">

<input id="title" placeholder="Title"><br><br>

<input id="module" placeholder="Module"><br><br>

<textarea id="steps" placeholder="Steps"></textarea><br><br>

<textarea id="expected" placeholder="Expected"></textarea><br><br>

<textarea id="actual" placeholder="Actual"></textarea><br><br>

<button onclick="submitUpdate()">Update</button>

<button onclick="closeModal()">Cancel</button>

</div>

</div>

</body>

</html>
